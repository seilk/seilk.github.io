# WhatATheme
# Math equation
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
# URL of the Site
url: https://seilk.github.io
# Base URL of the Site (i.e., Name of the Repository in which the Site is hosted)
baseurl: 

# Code highlighter
highlighter: rouge

# Title of the Site
title: SEIL KANG
# Description of the Site
description: Personal portfolio/Diary
# URL of Image of the Site
site-image: https://seilk.github.io/assets/images/main_my.jpg
# Keywords of the Site
site-keywords: AI, Developer, Research engineer
# URL for the Image of custom Favicon
favicon-url: 

darkmode_switch: true

# URL of the Image of Custom Hero Image (i.e., the image in the background of the very first section of the Homepage)
heroimage: https://seilk.github.io/assets/images/heroimage.jpg
heroimage_dark: https://seilk.github.io/assets/images/heroimage.jpg

# Social Media and Contact
# If you don't want to use any icon, you can leave them blank.
email: seil@yonsei.ac.kr
facebook_username: 
twitter_username: 
instagram_username: seildla
linkedin_username: 
github_username:  seilk
youtube_channel_id: 
reddit_username:
behance_username:
dribbble_username:
spotify_username:

# Google Analytics
google-analytics: G-KFNS88G1GM

# Disqus
disqus-shortname:

# Name of the Author
author-name: Seil
# URL for the Image of the Author
author-image: https://seilk.github.io/assets/images/main_my.jpg
# 60 Words About the Author
author-about: Yonsei University, Computer Science, Artificial intelligence, Deep learning, Medical Imaging and Computer Vision, Seoul, South Korea
# URL to the Author's Profile (i.e., Github, Twitter, Stackoverflow, etc)
author-url: https://github.com/seilk

# SASS
sass:
  sass_dir: _sass
  style: compressed

# Build settings
plugins:
  - jekyll-admin
  - jekyll-feed
  - jekyll-toc

# Permalink
permalink: "blog/:title"

# Compress
compress_html:
  clippings: all

# Defaults
defaults:
  -
    scope:
      type: 'posts'
    values:
      layout: post
      post-image: ""
      description: ""
      tags:
        - ""
  -
    scope:
      type: 'pages'
    values:
      layout: page
# toc
toc: 
  - min_level: 1 
  - max_level: 6 
  - ordered_list: false 
  - no_toc_section_class: no_toc_section 
  - list_class: section-nav 
  - sublist_class: '' 
  - item_class: toc-entry 
  - item_prefix: toc-

# Exclude
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/