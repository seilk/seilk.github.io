<div id="overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(255, 255, 255, 0.6); z-index: 999;"></div>

<div id="load" style="position: fixed; top: 35%; left: 42%; transform: translate(-50%, -50%);">
  <img src="{% if site.baseurl %}{{site.baseurl}}{% else %}{% endif %}/assets/images/my_loading.gif" alt="loading">
</div>

<script>
  const overlay = document.getElementById("overlay");
  const loading_page = document.getElementById("load");
  window.onload = function(){
    loading_page.style.display = 'none';
    overlay.style.display = 'none';
  }


</script>
